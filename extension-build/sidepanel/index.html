<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warmup</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body { width: 380px; min-height: 600px; margin: 0; overflow-y: auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fb; }

    /* Checkbox */
    .task-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #d1d5db; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s ease; }
    .task-check.done { background: #22c55e; border-color: #22c55e; }
    .task-check svg { opacity: 0; transition: opacity 0.15s; }
    .task-check.done svg { opacity: 1; }

    /* Task row */
    .task-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #fff; border-radius: 10px; margin-bottom: 6px; cursor: pointer; transition: all 0.15s ease; border: 1px solid transparent; }
    .task-row:hover { border-color: #e0d4f5; background: #faf8ff; }
    .task-row:active { transform: scale(0.99); }
    .task-row.completed .task-label { color: #9ca3af; text-decoration: line-through; }

    /* Section */
    .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .section-badge { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; }
    .section-time { font-size: 11px; color: #9ca3af; margin-left: auto; }

    /* AI tool button */
    .ai-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 8px; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; cursor: pointer; transition: all 0.15s ease; text-align: center; }
    .ai-btn:hover { border-color: #c4b5fd; background: #faf8ff; box-shadow: 0 2px 8px rgba(124,58,237,0.08); }
    .ai-btn:active { transform: scale(0.97); }
    .ai-btn .ai-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }

    /* Progress ring */
    .progress-ring { position: relative; width: 56px; height: 56px; }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring .count { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #fff; }

    /* AI result */
    .ai-result { animation: slideUp 0.25s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Golden window */
    .golden-bar { background: linear-gradient(90deg, #fef3c7, #fde68a); border: 1px solid #fbbf24; }

    /* Streak fire */
    .streak-num { font-size: 24px; font-weight: 800; line-height: 1; }
    .streak-label { font-size: 11px; opacity: 0.7; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./App.js"></script>
</body>
</html>
